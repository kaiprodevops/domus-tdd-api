[tox]
envlist = flake8,check-manifest,black,yamllint,py3

[testenv]
deps =
    pytest
extras = dev
commands =
  {envpython} -m pytest {posargs:tdd/tests}

# Only the test environment needs Node dependencies / build steps.
# This avoids running `npm ci` concurrently when `tox -p` runs multiple lint envs.
[testenv:py3]
allowlist_externals =
  npm
commands_pre =
  npm ci --no-audit --no-fund
  npm run build
commands =
  {envpython} -m pytest {posargs:tdd/tests}

[testenv:flake8]
basepython = python3
skip_install = true
deps =
  flake8 >= 4.0.1
# Ensure this env does not inherit any global pre-commands
commands_pre =
commands = flake8

[testenv:check-manifest]
skip_install = true
deps =
  check-manifest
commands_pre =
commands =
  {envpython} -m check_manifest {toxinidir}

[testenv:black]
basepython = python3
skip_install = true
deps =
  black >= 21.11b1
commands_pre =
commands = black --check .

[testenv:black-run]
basepython = python3
skip_install = true
deps =
  black >= 21.11b1
commands_pre =
commands = black .

[flake8]
basepython = python3
format = pylint
ignore = W503, E203, E731, E231
max-line-length = 100
exclude = test/data/*,.tox/*

[testenv:yamllint]
skip_install = true
deps = yamllint
commands_pre =
commands =
  yamllint docker-compose.yml